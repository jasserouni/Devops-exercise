name : deploy EC2 instance

on :
 push :
  branches : main



jobs: 
  deploy :
    name: deploy 
    runs-on : ubuntu-latest


    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ec2_aws:$(date +%s)

    - name: setting EC2 instance credentials
      uses: appleboy/ssh-action@v1.2.0
      with:
        aws_host: ${{ secrets.EC2_HOST }}
        aws_user: ${{ secrets.EC2_USER }}
        aws_key: ${{ secrets.EC2_SSH_KEY }}
    
    - name : ssh into EC2 instance
      run: |
          ssh aws-user@aws-user
          docker stop $(docker ps -q)
          docker run --expose=5000 $(docker ps -q)
        
    